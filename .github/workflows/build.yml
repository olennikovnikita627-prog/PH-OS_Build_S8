name: PH-OS Build S8

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get update
          # Ставим 6-ю версию компилятора — она «родная» для этого ядра
          sudo apt-get install -y bc bison build-essential curl flex git libelf-dev libssl-dev python3 libncurses5-dev gcc-6-aarch64-linux-gnu

      

      - name: Clone
        run: git clone --depth=1 https://github.com/exynos8895/android_kernel_samsung_universal8895.git kernel

      - name: Build
        run: |
          cd kernel
          export ARCH=arm64
          # Указываем использовать именно 6-ку
          export CROSS_COMPILE=aarch64-linux-gnu-gcc-6
          
          make exynos8895-dreamlte_defconfig
          
          # Вырезаем придирки
          find . -name "Makefile*" -type f -exec sed -i 's/-Werror//g' {} +
          
          # Запуск варки (на GCC 6 дополнительные флаги обычно не нужны)
          make -j$(nproc) KCFLAGS="-w" HOSTCFLAGS="-w"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Developer-Edition-Kernel
          path: kernel/arch/arm64/boot/Image.gz-dtb




















      

        


