name: PH-OS Build S8

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    # Магия здесь: запускаем всё внутри старой ОС
    container:
      image: ubuntu:18.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup (Ретро-инструменты)
        run: |
          apt-get update
          apt-get install -y bc bison build-essential curl flex git libelf-dev libssl-dev python3 libncurses5-dev gcc-aarch64-linux-gnu

      - name: Clone
        run: git clone --depth=1 https://github.com/exynos8895/android_kernel_samsung_universal8895.git kernel

      - name: Build
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          make exynos8895-dreamlte_defconfig
          
          # В Ubuntu 18.04 даже yylloc может собраться сам, 
          # но на всякий случай оставим мягкий фикс
          sed -i 's/YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped || true
          find . -name "Makefile*" -type f -exec sed -i 's/-Werror//g' {} + || true
          
          make -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Developer-Edition-Kernel
          path: kernel/arch/arm64/boot/Image.gz-dtb




























      

        


