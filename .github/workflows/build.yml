name: PH-OS Build S8

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get update
          # Устанавливаем классический тулчейн
          sudo apt-get install -y bc bison build-essential curl flex git libelf-dev libssl-dev python3 libncurses5-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Clone
        run: git clone --depth=1 https://github.com/exynos8895/android_kernel_samsung_universal8895.git kernel

      - name: Build
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # 1. Создаем конфиг
          make exynos8895-dreamlte_defconfig
          
          # 2. Главный костыль: отключаем ошибки компилятора в заголовках
          sed -i 's/-Werror//g' Makefile
          
          # 3. Запуск с флагом игнорирования несовместимости типов (частая беда S8)
          make -j$(nproc) KCFLAGS="-w -fno-pie" HOSTCFLAGS="-w"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Developer-Edition-Kernel
          path: kernel/arch/arm64/boot/Image.gz-dtb

















      

        


