name: PH-OS Build S8
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: sudo apt-get update && sudo apt-get install -y bc bison build-essential curl flex git libelf-dev libssl-dev python3 libncurses5-dev
      
      - name: Clone
        run: git clone --depth=1 https://github.com/exynos8895/android_kernel_samsung_universal8895.git kernel

      - name: Config
        run: |
          cd kernel
          export ARCH=arm64
          make CROSS_COMPILE=aarch64-linux-gnu- exynos8895-dreamlte_defconfig
          echo "Success! 🎯"



      

        


