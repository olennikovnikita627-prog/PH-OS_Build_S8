name: PH-OS Build S8
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/exynos8895/android_kernel_samsung_universal8895.git kernel
          echo "Kernel downloaded! 🧬"

      - name: Edit Makefile Header
        run: |
          cd kernel
          sed -i '5s/.*/EXTRAVERSION = -Android-Developer-Edition/' Makefile
          echo "Makefile updated with your status! ✍️"

      - name: Verify Makefile
        run: |
          cd kernel
          head -n 10 Makefile
      

        


