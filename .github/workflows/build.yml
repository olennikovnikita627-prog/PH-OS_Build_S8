name: PH-OS Build S8
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex git libelf-dev libssl-dev python3 libncurses5-dev
          echo "Tools ready! 🛠️"

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/exynos8895/android_kernel_samsung_universal8895.git kernel
          echo "Source downloaded! 🧬"

      - name: Edit Makefile Header
        run: |
          cd kernel
          sed -i '5s/.*/EXTRAVERSION = -Android-Developer-Edition/' Makefile
          echo "Name set! ✍️"

      - name: Configure Kernel
        run: |
          cd kernel
          export ARCH=arm64
          make CROSS_COMPILE=aarch64-linux-gnu- exynos8895-greatqlte_defconfig
          echo "Configured for S8! 🎯"

      

        


