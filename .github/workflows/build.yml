name: PH-OS Build S8

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex git libelf-dev libssl-dev python3 libncurses5-dev gcc-aarch64-linux-gnu

      - name: Clone
        run: git clone --depth=1 https://github.com/exynos8895/android_kernel_samsung_universal8895.git kernel

      - name: Build
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # 1. Конфиг
          make exynos8895-dreamlte_defconfig
          
          # 2. УМНЫЙ ФИКС: исправляем только там, где НЕТ слова extern
          # Сначала убираем возможные дубли, которые мы создали в прошлый раз
          grep -rl 'extern extern' . | xargs sed -i 's/extern extern/extern/g' || true
          # А теперь аккуратно фиксим оригинал, если там еще нет extern
          grep -rl '^YYLTYPE yylloc;' . | xargs sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' || true
          
          # 3. Зачистка Makefile
          find . -name "Makefile*" -type f -exec sed -i 's/-Werror//g' {} + || true
          
          # 4. ВАРКА
          make -j$(nproc) KCFLAGS="-w -fcommon" HOSTCFLAGS="-w -fcommon"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Developer-Edition-Kernel
          path: kernel/arch/arm64/boot/Image.gz-dtb


























      

        


